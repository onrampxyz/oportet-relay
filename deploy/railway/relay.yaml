# Railway deploy config for the Onramp gas-sponsorship relay (testnet + mainnet).
#
# Baked into the image and loaded with `--config-only`, so this file is
# authoritative for everything EXCEPT secrets, which are read from the env at
# boot (RELAY_MNEMONIC, RELAY_FUNDER_SIGNER_KEY, RELAY_FUNDER_OWNER_KEY,
# RELAY_DB_URL). NEVER put a secret in this file — it ships in the image.
#
# Contract addresses are GLOBAL (one uniform CREATE2 set, identical on every
# chain — testnet + mainnet). Per-chain `endpoint` values here are PUBLIC
# fallbacks; keyed provider URLs are injected at boot from env RPC_<chainId>
# (see config.rs load_from_file), so no keyed RPC ever lands in the image.

server:
  address: "0.0.0.0"
  port: 9119
  metrics_port: 9000
  max_connections: 100

fee_recipient: "0x3824525F5913F1908ce62ea5532C9757Bf3E25A7"
orchestrator: "0x6A9Aa49c955BF766b44979A9e375Bd83e2a8f485"
delegation_proxy: "0x9cEC2E86E7Cb43cB56350d8f928DFC194727E096"
simulator: "0x3006de101E96e85272d5B5Ad07A9738fa7678008"
funder: "0xFC4Cd2DCfF0F1e2781BF9fE7F48378843E176A2e"
escrow: "0xCd075ceb5Cd463a9233a8085fc915767139F655c"

quote:
  # No constantRate: the CoinGecko Pro oracle is live (GECKO_API env on the
  # service). constantRate 1.0 was a testnet stub; on mainnet it would misprice
  # any non-ETH fee token and lie in USD fee reporting.
  gas:
    intentBuffer: 0
    txBuffer: 0
  # 30s: oportet fires prepareCalls immediately before the passkey prompt
  # (verified in RelayActions.sendCalls), so the window only has to cover the
  # human prompt itself - measured 10-30s for PIN fallback, 3-8s for biometric.
  # Price drift inside 30s is absorbed by the quote's fee headroom: alloy's
  # default EIP-1559 estimator prices max_fee at 2x basefee + priority.
  ttl: 30
  # 180s: 3x the 60s CoinGecko poll - survives one failed poll on last-good,
  # fail-closes after ~2 consecutive failures (worst-case stale price ~2.5min).
  rateTtl: 180

# Gas-sponsorship policy. sponsor_all zeroes every eligible intent's fee (the
# funder pays gas). Ceiling fields are required (not serde-defaulted). Flip
# sponsor_all off + set quota_key: user for JWT-gated per-user quota.
sponsorship:
  sponsor_all: true
  circuit_breaker_wei: "1000000000000000000"
  per_user_wei: "10000000000000000"
  window_hours: 24

# Better Auth JWKS for verifying user bearer tokens (user-mode quota). Harmless
# under sponsor_all: an unverifiable/absent bearer just falls back to
# address-mode. Points at production; the jwt() plugin must be live there for
# user-mode to actually key by user.
auth:
  jwks_url: "https://onramp.xyz/api/auth/jwks"

chains:
  84532:
    endpoint: "https://sepolia.base.org"
    sim_mode: trace
    assets:
      ethereum:
        address: "0x0000000000000000000000000000000000000000"
        fee_token: true
    signers:
      num_signers: 3
  # Rise testnet. Our uniform contract set is deployed here too (CREATE2 -> same
  # top-level addresses as Base Sepolia). Public RPC, no secret in the image.
  11155931:
    endpoint: "https://indexing.testnet.riselabs.xyz"
    sim_mode: trace
    assets:
      ethereum:
        address: "0x0000000000000000000000000000000000000000"
        fee_token: true
    signers:
      num_signers: 3
  # --- Mainnet (uniform contract set deployed + funded on all three, 2026-07-17).
  # endpoint below is a public fallback; RPC_<chainId> env overrides with the keyed
  # provider URL at boot. LZ interop is configured on-chain but not yet enabled here.
  # Base mainnet.
  8453:
    endpoint: "https://mainnet.base.org"
    sim_mode: simulatev1
    assets:
      ethereum:
        address: "0x0000000000000000000000000000000000000000"
        fee_token: true
    signers:
      num_signers: 3
  # Polygon mainnet. Native gas asset is POL.
  137:
    endpoint: "https://polygon-rpc.com"
    sim_mode: simulatev1
    assets:
      pol:
        address: "0x0000000000000000000000000000000000000000"
        fee_token: true
    signers:
      num_signers: 3
  # Rise mainnet. Keyed RPC supports eth_simulateV1 (probed), so simulatev1 like
  # the other mainnets; only the public-RPC testnets fall back to trace.
  4153:
    endpoint: "https://rpc.risechain.com"
    sim_mode: simulatev1
    assets:
      ethereum:
        address: "0x0000000000000000000000000000000000000000"
        fee_token: true
    signers:
      num_signers: 3
